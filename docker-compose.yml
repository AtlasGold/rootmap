services:

  neo4j:
    image: neo4j:5-community
    container_name: rootmap-neo4j
    environment:
      NEO4J_AUTH: neo4j/rootmap123
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./data/neo4j:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p rootmap123 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
